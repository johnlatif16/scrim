<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Scrim Register</title>
  <style>
    body{font-family:system-ui;max-width:800px;margin:40px auto;padding:16px}
    input,textarea,button{width:100%;padding:10px;margin:6px 0;border-radius:10px;border:1px solid #ccc}
    button{border-color:#111;cursor:pointer}
    .card{border:1px solid #eee;border-radius:14px;padding:14px;margin-top:10px}
    .top{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}
    a{color:blue;text-decoration:none}
  </style>
</head>
<body>

  <div class="top">
    <h2>تسجيل الاسكريم</h2>
    <a href="/login">دخول الأدمن</a>
  </div>

  <form id="form">
    <input id="teamName" placeholder="اسم التيم" required />
    <input id="leaderName" placeholder="اسم القائد" required />
    <input id="leaderId" placeholder="PUBG ID للقائد" required />
    <textarea id="players" rows="4" placeholder="اللاعبين (اختياري) كل لاعب في سطر"></textarea>
    <button type="submit">تسجيل</button>
  </form>

  <h3>الليستة</h3>
  <div id="list"></div>

<script>
  const listDiv = document.getElementById("list");

  async function loadScrims() {
    const res = await fetch("/api/scrims");
    const data = await res.json();
    const items = data.items || [];

    listDiv.innerHTML = "";
    if(items.length === 0){
      listDiv.innerHTML = "<p>لسه مفيش تسجيلات.</p>";
      return;
    }

    items.forEach(x => {
      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `
        <b>${x.teamName}</b>
        <div>القائد: ${x.leaderName} — ID: ${x.leaderId}</div>
        <div style="opacity:.75;font-size:12px">${new Date(x.createdAt).toLocaleString()}</div>
        ${x.players && x.players.length ? `<div>اللاعبين: ${x.players.join(" / ")}</div>` : ""}
      `;
      listDiv.appendChild(div);
    });
  }

  document.getElementById("form").addEventListener("submit", async (e) => {
    e.preventDefault();

    const teamName = document.getElementById("teamName").value;
    const leaderName = document.getElementById("leaderName").value;
    const leaderId = document.getElementById("leaderId").value;
    const playersText = document.getElementById("players").value;

    const players = playersText
      .split("\n")
      .map(x => x.trim())
      .filter(Boolean);

    const res = await fetch("/api/scrims", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ teamName, leaderName, leaderId, players })
    });

    if(!res.ok){
      const err = await res.json().catch(()=>({}));
      alert(err.error || "حصل خطأ");
      return;
    }

    document.getElementById("form").reset();
    loadScrims();
  });

  loadScrims();
</script>

</body>
</html>
