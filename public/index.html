<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Scrim Register tripESPORTS</title>
  <style>
    :root{
      --bg:#0b1020;
      --text:#e9ecff;
      --muted:#aab1d6;
      --line:rgba(255,255,255,.08);
      --brand:#6c7cff;
      --brand2:#22d3ee;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui;
      background:
        radial-gradient(1000px 600px at 20% 10%, rgba(108,124,255,.25), transparent 60%),
        radial-gradient(900px 500px at 90% 20%, rgba(34,211,238,.18), transparent 60%),
        var(--bg);
      color:var(--text);
    }
    .wrap{max-width:980px;margin:32px auto;padding:16px}
    .hero{
      display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;
      padding:18px;border:1px solid var(--line);border-radius:18px;
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      box-shadow:0 10px 30px rgba(0,0,0,.25);
    }
    .hero h1{margin:0;font-size:26px}
    .hero p{margin:6px 0 0;color:var(--muted)}
    .grid{display:grid;grid-template-columns:1.05fr .95fr;gap:14px;margin-top:14px}
    @media (max-width: 860px){.grid{grid-template-columns:1fr}}
    .card{
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      border-radius:18px;padding:16px;
      box-shadow:0 10px 30px rgba(0,0,0,.20);
    }
    label{display:block;color:var(--muted);font-size:13px;margin:10px 0 6px}
    input, select{
      width:100%;
      padding:12px;
      border-radius:14px;
      border:1px solid var(--line);
      background:rgba(10,15,35,.55);
      color:var(--text);
      outline:none;
    }
    .primary{
      width:100%;
      margin-top:12px;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid rgba(108,124,255,.55);
      background:linear-gradient(90deg, rgba(108,124,255,.55), rgba(34,211,238,.30));
      color:var(--text);
      font-weight:700;
      cursor:pointer;
    }
    .sectionTitle{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
    .sectionTitle h2{margin:0;font-size:18px}
    .pill{
      font-size:12px;color:var(--muted);
      border:1px solid var(--line);
      padding:6px 10px;border-radius:999px;
      background:rgba(255,255,255,.03);
    }
    .list{display:grid;gap:10px;margin-top:12px}
    .item{
      border:1px solid var(--line);
      border-radius:16px;padding:14px;
      background:linear-gradient(180deg, rgba(17,27,61,.85), rgba(15,23,51,.65));
    }
    .toprow{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}
    .name{font-weight:900;font-size:16px}
    .meta{color:var(--muted);font-size:12px}
    .roleTag{
      display:inline-block;margin-top:10px;
      font-size:12px;
      padding:6px 10px;border-radius:999px;
      border:1px solid var(--line);
      background:rgba(108,124,255,.14);
    }
    .empty{color:var(--muted);padding:8px 2px}
    .hint{color:var(--muted);font-size:13px;margin-top:10px}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div>
        <h1>تسجيل الاسكريم</h1>
        <p>سجّل اسمك ومركزك — واسمك هيظهر في الليستة تلقائي.</p>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <form id="form">
          <label>اسم اللاعب</label>
          <input id="name" placeholder="اكتب اسمك" required />

          <label>مركز اللاعب</label>
          <select id="role" required>
            <option value="" selected disabled>اختار المركز</option>
            <option>Fragger</option>
            <option>Flanker</option>
            <option>Viper</option>
            <option>Support</option>
          </select>

          <button class="primary" type="submit">تسجيل</button>
          <div class="hint">ملحوظة: سجل مرة واحدة فقط.</div>
        </form>
      </div>

      <div class="card">
        <div class="sectionTitle">
          <h2>الليستة</h2>
          <span class="pill" id="count">0 لاعب</span>
        </div>
        <div class="list" id="list"></div>
      </div>
    </div>
  </div>

<script>
  const listDiv = document.getElementById("list");
  const countPill = document.getElementById("count");

  async function loadScrims() {
    const res = await fetch("/api/scrims");
    const data = await res.json();
    const items = data.items || [];

    countPill.textContent = `${items.length} لاعب`;

    listDiv.innerHTML = "";
    if(items.length === 0){
      listDiv.innerHTML = `<div class="empty">لسه مفيش تسجيلات.</div>`;
      return;
    }

    items.forEach(x => {
      const div = document.createElement("div");
      div.className = "item";
      div.innerHTML = `
        <div class="toprow">
          <div class="name">${escapeHtml(x.name)}</div>
          <div class="meta">${new Date(x.createdAt).toLocaleString()}</div>
        </div>
        <div class="roleTag">المركز: <b>${escapeHtml(x.role)}</b></div>
      `;
      listDiv.appendChild(div);
    });
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, (m) => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
    }[m]));
  }

  document.getElementById("form").addEventListener("submit", async (e) => {
    e.preventDefault();

    const name = document.getElementById("name").value.trim();
    const role = document.getElementById("role").value;

    const res = await fetch("/api/scrims", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ name, role })
    });

    if(!res.ok){
      const err = await res.json().catch(()=>({}));
      alert(err.error || "حصل خطأ");
      return;
    }

    document.getElementById("form").reset();
    loadScrims();
  });

  loadScrims();
</script>

</body>
</html>
