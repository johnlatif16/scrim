<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Login</title>
  <style>
    body{font-family:system-ui;max-width:520px;margin:50px auto;padding:16px}
    input,button{width:100%;padding:10px;margin:6px 0;border-radius:10px;border:1px solid #ccc}
    button{border-color:#111;cursor:pointer}
    .card{border:1px solid #eee;border-radius:14px;padding:14px}
    .err{color:#b00020;margin-top:8px}
    a{color:blue;text-decoration:none}
  </style>
</head>
<body>

  <h2>دخول الأدمن</h2>
  <div class="card">
    <input id="username" placeholder="Username" />
    <input id="password" placeholder="Password" type="password" />
    <button id="btn">Login</button>
    <div id="msg" class="err"></div>
  </div>

  <p style="margin-top:12px;">
    <a href="/">رجوع للتسجيل</a>
  </p>

<script>
  const msg = document.getElementById("msg");

  document.getElementById("btn").addEventListener("click", async () => {
    msg.textContent = "";

    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    const res = await fetch("/api/admin/login", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ username, password })
    });

    if(!res.ok){
      const err = await res.json().catch(()=>({}));
      msg.textContent = err.error || "Login failed";
      return;
    }

    const data = await res.json();
    localStorage.setItem("admin_token", data.token);

    location.href = "/dashboard";
  });
</script>

</body>
</html>
