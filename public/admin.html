<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Panel</title>
  <style>
    body{font-family:system-ui,Arial; max-width:1100px; margin:20px auto; padding:0 12px}
    .card{border:1px solid #ddd; border-radius:12px; padding:14px; margin-bottom:14px}
    button,input,textarea{padding:8px}
    table{width:100%; border-collapse:collapse}
    th,td{border-bottom:1px solid #eee; padding:10px; text-align:right; vertical-align:top}
    .actions{display:flex; gap:8px; flex-wrap:wrap}
    .muted{opacity:.75}
  </style>
</head>
<body>
  <h1>لوحة الأدمن</h1>

  <div class="card">
    <button id="logout">Logout</button>
    <span class="muted" id="status"></span>
  </div>

  <div class="card">
    <h3>كل الاسكرِمات</h3>
    <table>
      <thead>
        <tr>
          <th>ID</th><th>العنوان</th><th>المود</th><th>التاريخ</th><th>الوقت</th><th>المنظّم</th><th>تحكم</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </div>

<script>
  const rows = document.getElementById("rows");
  const status = document.getElementById("status");

  async function ensureAuth(){
    const res = await fetch("/api/admin/me");
    if(!res.ok){
      location.href = "/login.html";
      return false;
    }
    status.textContent = "✅ Logged in";
    return true;
  }

  function escapeHtml(x){
    return String(x ?? "")
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  async function load(){
    const ok = await ensureAuth();
    if(!ok) return;

    const res = await fetch("/api/admin/scrims");
    const data = await res.json();

    rows.innerHTML = data.map(s => `
      <tr>
        <td>${s.id}</td>
        <td><input data-id="${s.id}" data-k="title" value="${escapeHtml(s.title)}"></td>
        <td><input data-id="${s.id}" data-k="mode" value="${escapeHtml(s.mode)}"></td>
        <td><input data-id="${s.id}" data-k="date" value="${escapeHtml(s.date)}"></td>
        <td><input data-id="${s.id}" data-k="time" value="${escapeHtml(s.time)}"></td>
        <td><input data-id="${s.id}" data-k="organizer" value="${escapeHtml(s.organizer)}"></td>
        <td class="actions">
          <button onclick="save(${s.id})">حفظ</button>
          <button onclick="del(${s.id})">حذف</button>
        </td>
      </tr>
    `).join("");
  }

  async function save(id){
    const inputs = [...document.querySelectorAll(`input[data-id="${id}"]`)];
    const body = {};
    for(const i of inputs) body[i.dataset.k] = i.value;

    const res = await fetch(`/api/admin/scrims/${id}`, {
      method:"PUT",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify(body)
    });
    if(!res.ok){
      alert("فشل الحفظ");
      return;
    }
    alert("تم الحفظ");
  }

  async function del(id){
    if(!confirm("متأكد؟")) return;
    const res = await fetch(`/api/admin/scrims/${id}`, { method:"DELETE" });
    if(!res.ok){
      alert("فشل الحذف");
      return;
    }
    await load();
  }

  document.getElementById("logout").addEventListener("click", async () => {
    await fetch("/api/admin/logout", { method:"POST" });
    location.href = "/login.html";
  });

  load();
</script>
</body>
</html>
