<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin Dashboard</title>
  <style>
    :root{
      --bg:#0b1020;
      --text:#e9ecff;
      --muted:#aab1d6;
      --line:rgba(255,255,255,.08);
      --brand:#6c7cff;
      --brand2:#22d3ee;
      --danger:#ff4d6d;
    }
    *{box-sizing:border-box}
    body{
      margin:0;font-family:system-ui;color:var(--text);
      background:
        radial-gradient(1000px 600px at 20% 10%, rgba(108,124,255,.25), transparent 60%),
        radial-gradient(900px 500px at 90% 20%, rgba(34,211,238,.18), transparent 60%),
        var(--bg);
      min-height:100vh;
    }
    .wrap{max-width:980px;margin:32px auto;padding:16px}
    .bar{
      display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;
      padding:18px;border-radius:18px;border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      box-shadow:0 10px 30px rgba(0,0,0,.25);
    }
    h1{margin:0;font-size:22px}
    .sub{color:var(--muted);font-size:13px;margin-top:6px}
    .btn{
      padding:10px 14px;border-radius:14px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      color:var(--text);cursor:pointer;
      transition:transform .12s ease, border-color .12s ease, filter .12s ease;
    }
    .btn:hover{transform:translateY(-1px);border-color:rgba(108,124,255,.45)}
    .btnPrimary{
      border:1px solid rgba(108,124,255,.55);
      background:linear-gradient(90deg, rgba(108,124,255,.55), rgba(34,211,238,.30));
      font-weight:800;
    }
    .btnDanger{
      border:1px solid rgba(255,77,109,.6);
      background:rgba(255,77,109,.12);
    }

    .stats{
      display:flex;gap:10px;flex-wrap:wrap;margin-top:14px
    }
    .pill{
      font-size:12px;color:var(--muted);
      border:1px solid var(--line);
      padding:8px 12px;border-radius:999px;
      background:rgba(255,255,255,.03);
    }

    .list{display:grid;gap:10px;margin-top:14px}
    .item{
      border:1px solid var(--line);
      border-radius:16px;padding:14px;
      background:linear-gradient(180deg, rgba(17,27,61,.85), rgba(15,23,51,.65));
      box-shadow:0 8px 22px rgba(0,0,0,.18);
    }
    .toprow{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}
    .name{font-weight:900;font-size:16px}
    .meta{color:var(--muted);font-size:12px}
    .row{margin-top:8px;color:rgba(233,236,255,.92)}
    .tag{
      display:inline-block;margin-top:10px;
      font-size:12px;
      padding:6px 10px;border-radius:999px;
      border:1px solid var(--line);
      background:rgba(108,124,255,.14);
    }
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    .empty{color:var(--muted);padding:8px 2px}

    /* Modal */
    .modalBackdrop{
      position:fixed;inset:0;
      background:rgba(0,0,0,.55);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
    }
    .modal{
      width:100%;
      max-width:520px;
      border:1px solid var(--line);
      border-radius:18px;
      padding:16px;
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      box-shadow:0 20px 60px rgba(0,0,0,.40);
      backdrop-filter: blur(6px);
    }
    .modalHead{
      display:flex;justify-content:space-between;align-items:center;gap:10px;
      margin-bottom:10px
    }
    .modalHead h2{margin:0;font-size:18px}
    .xbtn{
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
      color:var(--text);
      border-radius:12px;
      padding:8px 10px;
      cursor:pointer;
    }
    label{display:block;color:var(--muted);font-size:13px;margin:10px 0 6px}
    input,select{
      width:100%;
      padding:12px;border-radius:14px;border:1px solid var(--line);
      background:rgba(10,15,35,.55);
      color:var(--text);
      outline:none;
    }
    input:focus,select:focus{border-color:rgba(108,124,255,.55)}
    .modalActions{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    .grow{flex:1}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="bar">
      <div>
        <h1>Dashboard</h1>
        <div class="sub">tripESPORTS</div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn btnPrimary" id="refreshBtn">تحديث</button>
        <button class="btn btnDanger" id="logoutBtn">Logout</button>
      </div>
    </div>

    <div class="stats">
      <div class="pill" id="countPill">0 لاعب</div>
    </div>

    <div class="list" id="list"></div>
  </div>

  <!-- Edit Modal -->
  <div class="modalBackdrop" id="modalBackdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modalHead">
        <h2 id="modalTitle">تعديل اللاعب</h2>
        <button class="xbtn" id="closeModalBtn">✕</button>
      </div>

      <label>اسم اللاعب</label>
      <input id="editName" placeholder="اسم اللاعب" />

      <label>مركز اللاعب</label>
      <select id="editRole">
        <option>IGL</option>
        <option>Fragger</option>
        <option>Supporter</option>
        <option>Scouter</option>
      </select>

      <div class="modalActions">
        <button class="btn btnDanger" id="deleteFromModalBtn">حذف</button>
        <div class="grow"></div>
        <button class="btn" id="cancelBtn">إلغاء</button>
        <button class="btn btnPrimary" id="saveBtn">حفظ</button>
      </div>

      <div class="sub" id="modalMsg" style="margin-top:10px"></div>
    </div>
  </div>

<script>
  const listDiv = document.getElementById("list");
  const countPill = document.getElementById("countPill");

  const refreshBtn = document.getElementById("refreshBtn");
  const logoutBtn = document.getElementById("logoutBtn");

  // Modal elements
  const modalBackdrop = document.getElementById("modalBackdrop");
  const closeModalBtn = document.getElementById("closeModalBtn");
  const cancelBtn = document.getElementById("cancelBtn");
  const saveBtn = document.getElementById("saveBtn");
  const deleteFromModalBtn = document.getElementById("deleteFromModalBtn");
  const editName = document.getElementById("editName");
  const editRole = document.getElementById("editRole");
  const modalMsg = document.getElementById("modalMsg");

  let currentEditing = null; // {id, name, role, createdAt}

  function getToken(){ return localStorage.getItem("admin_token"); }

  function logout(){
    localStorage.removeItem("admin_token");
    location.href = "/login";
  }

  async function api(path, options = {}){
    const token = getToken();
    if(!token){ logout(); return null; }

    const res = await fetch(path, {
      ...options,
      headers: {
        ...(options.headers || {}),
        "Authorization": "Bearer " + token
      }
    });

    if(res.status === 401){ logout(); return null; }
    return res;
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, (m) => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
    }[m]));
  }

  function openModal(item){
    currentEditing = item;
    modalMsg.textContent = "";
    editName.value = item.name || "";
    editRole.value = item.role || "Fragger";

    modalBackdrop.style.display = "flex";
    modalBackdrop.setAttribute("aria-hidden", "false");
    setTimeout(() => editName.focus(), 0);
  }

  function closeModal(){
    modalBackdrop.style.display = "none";
    modalBackdrop.setAttribute("aria-hidden", "true");
    currentEditing = null;
  }

  async function load(){
    const res = await api("/api/admin/scrims");
    if(!res) return;

    const data = await res.json().catch(()=>({}));
    const items = data.items || [];

    countPill.textContent = `${items.length} لاعب`;

    listDiv.innerHTML = "";
    if(items.length === 0){
      listDiv.innerHTML = `<div class="empty">مفيش تسجيلات.</div>`;
      return;
    }

    items.forEach(item => {
      const div = document.createElement("div");
      div.className = "item";
      div.innerHTML = `
        <div class="toprow">
          <div class="name">${escapeHtml(item.name)}</div>
          <div class="meta">${new Date(item.createdAt).toLocaleString()}</div>
        </div>

        <div class="row">
          <span class="tag">المركز: <b>${escapeHtml(item.role)}</b></span>
        </div>

        <div class="actions">
          <button class="btn btnPrimary">تعديل</button>
          <button class="btn btnDanger">حذف</button>
        </div>
      `;

      const [editBtn, delBtn] = div.querySelectorAll("button");
      editBtn.addEventListener("click", () => openModal(item));
      delBtn.addEventListener("click", () => deleteScrim(item.id));

      listDiv.appendChild(div);
    });
  }

  async function deleteScrim(id){
    if(!confirm("متأكد إنك عاوز تحذف التسجيل ده؟")) return;
    const res = await api("/api/admin/scrims/" + id, { method: "DELETE" });
    if(!res) return;

    if(currentEditing && currentEditing.id === id) closeModal();
    load();
  }

  async function saveEdit(){
    if(!currentEditing) return;

    const name = editName.value.trim();
    const role = editRole.value;

    if(!name){
      modalMsg.textContent = "اكتب اسم اللاعب.";
      return;
    }

    saveBtn.disabled = true;
    modalMsg.textContent = "جارٍ الحفظ...";

    const res = await api("/api/admin/scrims/" + currentEditing.id, {
      method: "PUT",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ name, role })
    });

    saveBtn.disabled = false;

    if(!res) return;
    const out = await res.json().catch(()=>({}));

    if(!res.ok){
      modalMsg.textContent = out.error || "فشل الحفظ.";
      return;
    }

    modalMsg.textContent = "تم الحفظ ✅";
    closeModal();
    load();
  }

  // Events
  refreshBtn.addEventListener("click", load);
  logoutBtn.addEventListener("click", logout);

  closeModalBtn.addEventListener("click", closeModal);
  cancelBtn.addEventListener("click", closeModal);

  saveBtn.addEventListener("click", saveEdit);
  deleteFromModalBtn.addEventListener("click", () => {
    if(currentEditing) deleteScrim(currentEditing.id);
  });

  modalBackdrop.addEventListener("click", (e) => {
    if(e.target === modalBackdrop) closeModal();
  });

  document.addEventListener("keydown", (e) => {
    if(e.key === "Escape") closeModal();
  });

  if(!getToken()) location.href = "/login";
  load();
</script>

</body>
</html>
